<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Extract Secret Message - StegoSite</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 500px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Retrieve Hidden Message</h2>
        <p>Upload the stego-file and provide the original parameters to extract the message.</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}<p style="color: red;">{{ messages[0] }}</p>{% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Stego File (Carrier):</label>
                <input type="file" name="carrier" required>
            </div>
            <div class="form-group">
                <label>Start Bit (S):</label>
                <input type="number" name="S" value="1024">
            </div>
            <div class="form-group">
                <label>Periodicity (L):</label>
                <input type="number" name="L" value="8">
            </div>
            <div class="form-group">
                <label>Message Length (in bits):</label>
                <input type="number" name="bits" placeholder="e.g. 88" required>
            </div>
            <div class="form-group">
                <label>Save As Extension:</label>
                <select name="extension">
                    <option value=".txt">.txt (Text)</option>
                    <option value=".jpg">.jpg (Image)</option>
                    <option value=".png">.png (Image)</option>
                    <option value=".pdf">.pdf (Document)</option>
                </select>
            </div>
            <button type="submit">Extract and Download</button>
        </form>
        <br>
        <a href="{{ url_for('index') }}">Back to Gallery</a>
    </div>
</body>
</html>
