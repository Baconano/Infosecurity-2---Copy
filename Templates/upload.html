<form method="POST" enctype="multipart/form-data">
    <label>Carrier File (P):</label> <input type="file" name="carrier" required><br>
    <label>Secret Message (M):</label> <input type="file" name="message" required><br>
    <label>Start Bit (S):</label> <input type="number" name="S" value="1024"><br>
    <label>Periodicity (L):</label> <input type="number" name="L" value="8"><br>
    <button type="submit">Hide and Post</button>
</form>
