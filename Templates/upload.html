<!DOCTYPE html>
<html>
<head><title>Create Stego File</title></head>
<body>
    <h2>Hide a Secret Message</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<p style="color: blue;">{{ messages[0] }}</p>{% endif %}
    {% endwith %}
    
    <form method="POST" enctype="multipart/form-data">
        <p>Carrier File (P): <input type="file" name="carrier" required></p>
        <p>Secret Message (M): <input type="file" name="message" required></p>
        <p>Start Bit (S): <input type="number" name="S" value="1024"></p>
        <p>Periodicity (L): <input type="number" name="L" value="8"></p>
        <button type="submit">Hide and Post to Gallery</button>
    </form>
    <br><a href="{{ url_for('index') }}">Back to Gallery</a>
</body>
</html>
