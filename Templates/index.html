<h2>Public Postings</h2>
<div class="gallery">
    {% for file in files %}
        <div class="item">
            <img src="{{ url_for('static', filename='uploads/' + file) }}" width="200">
            <p>{{ file }}</p>
        </div>
    {% endfor %}
</div>
{% if current_user.is_authenticated %}
    <a href="/upload">Create New Stego File</a>
{% else %}
    <a href="/login">Login to Upload</a>
{% endif %}
